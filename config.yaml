# Configuration Visio_Gemini — grille macro multi-agents (MACRO_AGENTS.md)

# ── Chemins projet ──────────────────────────────────────────
paths:
  storage_state: secrets/storage_state.json
  captures: captures/
  logs: logs/

# ── Timeframes TradingView (minutes) ───────────────────────
timeframes:
  "30m": 30
  "1h": 60
  "4h": 240
  "1D": 1440

# ── Symboles macro ─────────────────────────────────────────
symbols:
  TOTAL3ES:
    tv: CRYPTOCAP:TOTAL3ES
    role: filtre_macro_principal
    timeframes: ["1h", "4h", "1D"]

  OTHERS:
    tv: CRYPTOCAP:OTHERS
    role: filtre_mid_small_caps
    timeframes: ["1h", "4h", "1D"]

  USDT.D:
    tv: CRYPTOCAP:USDT.D
    role: filtre_sentiment_stables
    timeframes: ["1h", "4h", "1D"]

  BTCUSDT:
    tv: BINANCE:BTCUSDT
    role: correlation_confirmation
    timeframes: ["30m", "1h", "4h", "1D"]

# ── Agents ↔ layouts TradingView ───────────────────────────
agents:
  agent_a:
    name: Ichimoku + RSI
    indicators: [ichimoku, rsi]
    layout:
      id: VLmoQO22
      status: ready
    verdict_scale: [GREEN, YELLOW, RED]
    enabled: true

  agent_b:
    name: BB + Volume
    indicators: [bollinger_bands, volume]
    layout:
      id: guJhPkAj
      status: ready
    verdict_scale: [GREEN, YELLOW, RED]
    enabled: true

  agent_c:
    name: EMA50/200 + MACD
    indicators: [ema50, ema200, macd]
    layout:
      id: bl0W3Xyj
      status: ready
    verdict_scale: [GREEN, YELLOW, RED]
    enabled: true

# ── Exécution courante ─────────────────────────────────────
run:
  agents: [agent_a, agent_b, agent_c]
  symbols: [BTCUSDT]
  timeframes: ["4h"]
  priority_timeframes: ["4h", "1D"]

# ── Capture Playwright ─────────────────────────────────────
capture:
  viewport: { width: 1920, height: 1080 }
  wait_ms: 5000
  headless: true

# ── Grille macro (référence unique pour modules/) ──
macro:
  agents: [agent_a, agent_b, agent_c]
  symbols: [TOTAL3ES, OTHERS, USDT.D, BTCUSDT]
  timeframes: ["4h", "1D"]

# ── Providers IA (ÉTAPE 3+) ──────────────────────────────────
providers:
  strategy: gemini_first          # gemini_first | mammouth_only | gemini_only
  primary: gemini
  fallback: mammouth
  gemini:
    model: gemini-2.5-flash       # placeholder — validé en ÉTAPE 3 (fallback: gemini-2.0-flash)
    fallback_model: gemini-2.0-flash
    api_key_env: GOOGLE_API_KEY
  mammouth:
    model_env: CHART_VISION_MODEL
    base_url_env: OPENAI_BASE_URL
    api_key_env: OPENAI_API_KEY

# ── Dashboard FastAPI + HTMX (ÉTAPE 6+) ─────────────────────
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8003
